<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCards - Marquis Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep, #070a13); }
        ::-webkit-scrollbar-thumb { background: var(--border-color, #1e293b); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-color, #3b82f6); box-shadow: 0 0 10px var(--primary-color, #3b82f6); }
        :root { --bg-deep: #070a13; --bg-card: #0b0f19; --bg-input: #111827; --primary-color: #3b82f6; --primary-glow: rgba(59,130,246,0.2); --text-main: #f8fafc; --border-color: #1e293b; }
        .theme-emerald { --bg-deep: #020604; --bg-card: #050f0a; --bg-input: #0c1f14; --primary-color: #10b981; --primary-glow: rgba(16,185,129,0.2); --text-main: #d1fae5; --border-color: #064e3b; }
        .theme-crimson { --bg-deep: #0a0204; --bg-card: #14050a; --bg-input: #1f0c12; --primary-color: #f43f5e; --primary-glow: rgba(244,63,94,0.2); --text-main: #ffe4e6; --border-color: #4c0519; }
        body { margin:0; background:var(--bg-deep); color:var(--text-main); font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        .premium-card { animation: pulseGlow 6s infinite ease-in-out; }
        @keyframes pulseGlow { 0%, 100% { border-color: var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.4); } 50% { border-color: var(--primary-color); box-shadow: 0 4px 25px var(--primary-glow); } }
    </style>
</head>
<body id="masterBody">

    <div id="app" style="display:flex; flex:1; height:100vh; overflow:hidden; padding:20px;">
        <div id="viewSystemSettingsDashboard" style="width:100%; display:flex; flex-direction:column; gap:2rem; background:var(--bg-card); border:2px solid #ef4444; padding:3rem; border-radius:24px;">
            <div>
                <h2 style="margin:0; font-size:2rem; font-weight:900; color:#ef4444; text-transform: uppercase;">System Settings Dashboard</h2>
                <p style="color:#94a3b8;">Connected to Cloud Storage.</p>
            </div>
            <div style="display:flex; flex-direction:column; gap:15px;">
                <button id="deleteAllDecksBtn" style="background:rgba(239, 68, 68, 0.1); color:#ef4444; border:2px solid #ef4444; padding:1.5rem; border-radius:16px; cursor:pointer;">PURGE ALL ACTIVE FOLDERS</button>
                <button id="deleteAccountBtn" style="background:#ef4444; color:white; border:2px solid #ef4444; padding:1.5rem; border-radius:16px; cursor:pointer;">TERMINATE AUTHORIZATION KEY</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // CONFIGURATION
        const SUPABASE_URL = 'https://olumrzkpqmhypagkhvmy.supabase.co';
        const SUPABASE_ANON_KEY = 'PASTE_YOUR_ANON_KEY_HERE'; // <--- PUT YOUR KEY HERE

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // APP INITIALIZATION
        async function initApp() {
            try {
                // Check if user is authenticated
                const { data: { user } } = await supabase.auth.getUser();
                
                // Fetch settings from Cloud Table 'user_settings'
                const { data: settings, error } = await supabase
                    .from('user_settings')
                    .select('*')
                    .maybeSingle();

                if (settings) {
                    document.body.className = `theme-${settings.theme || 'default'}`;
                }
                
                console.log("App ready. Cloud synced.");
            } catch (err) {
                console.error("Initialization error:", err);
            }
        }

        // EVENT LISTENERS FOR DESTRUCTIVE BUTTONS
        document.getElementById('deleteAllDecksBtn').addEventListener('click', async () => {
            if(confirm("Are you sure you want to purge all cloud data?")) {
                await supabase.from('decks').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                alert("Data purged.");
            }
        });

        initApp();
    </script>
</body>
</html>
