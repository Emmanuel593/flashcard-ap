<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCards - Marquis Edition</title>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep, #070a13); }
        ::-webkit-scrollbar-thumb { background: var(--border-color, #1e293b); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-color, #3b82f6); }
        
        :root {
            --bg-deep: #070a13; --bg-card: #0b0f19; --bg-input: #111827;
            --primary-color: #3b82f6; --primary-glow: rgba(59,130,246,0.2);
            --text-main: #f8fafc; --border-color: #1e293b;
        }

        /* 3D FLIP ENGINE */
        .card-wrapper { perspective: 1000px; width: 100%; max-width: 720px; }
        .card-inner {
            position: relative; width: 100%; height: 210px; text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d; cursor: pointer;
        }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            border-radius: 24px; border: 1px solid var(--border-color);
            background: var(--bg-card); padding: 2rem; box-sizing: border-box;
            box-shadow: 0 25px 50px rgba(0,0,0,0.65); font-size: 1.65rem; font-weight: 800;
        }
        .card-back { transform: rotateY(180deg); }
    </style>
</head>
<body id="masterBody" style="margin:0; background:var(--bg-deep); color:var(--text-main); font-family:sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden;">

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // --- CORE LAYOUT ---
        document.body.innerHTML = `
        <div style="flex:1; padding:2rem; display:flex; flex-direction:column; align-items:center; overflow-y:auto;">
            <div id="appScreen" style="width:100%; max-width:720px; display:flex; flex-direction:column; align-items:center; gap:1.3rem;">
                
                <div class="card-wrapper">
                    <div id="cardInner" class="card-inner">
                        <div id="cardFront" class="card-face">Front (Click to Flip)</div>
                        <div id="cardBack" class="card-face card-back">Back</div>
                    </div>
                </div>

                <div style="display:flex; gap:28px; align-items:center;">
                    <button id="prevBtn" style="padding:1rem; cursor:pointer;">←</button>
                    <span id="navTracker">0 / 0</span>
                    <button id="nextBtn" style="padding:1rem; cursor:pointer;">→</button>
                </div>
            </div>
        </div>`;

        // --- FLIP LOGIC ---
        const cardInner = document.getElementById('cardInner');
        
        cardInner.addEventListener('click', () => {
            cardInner.classList.toggle('is-flipped');
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            cardInner.classList.remove('is-flipped');
            // Add your deck iteration logic here
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            cardInner.classList.remove('is-flipped');
            // Add your deck iteration logic here
        });

        console.log("Marquis Edition: 3D Flip Engine Active.");
    </script>
</body>
</html>
