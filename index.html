<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCards - Marquis Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-deep: #070a13; --bg-card: #0b0f19; --text-main: #f8fafc; --primary-color: #3b82f6; --border-color: #1e293b; }
        body { margin:0; background:var(--bg-deep); color:var(--text-main); font-family: sans-serif; height:100vh; display:flex; flex-direction:column; }
        #app { padding: 2rem; }
    </style>
</head>
<body>
    <div id="app">Loading Cloud Workspace...</div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // REPLACE THESE WITH YOUR ACTUAL SETTINGS FROM SUPABASE API DASHBOARD
        const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co'; 
        const SUPABASE_ANON_KEY = 'YOUR_ACTUAL_ANON_KEY_FROM_DASHBOARD'; 

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function initApp() {
            try {
                // Fetch data
                const { data, error } = await supabase.from('user_settings').select('*').limit(1);
                
                document.getElementById('app').innerHTML = `
                    <h1>Workspace Loaded</h1>
                    <p>Connection Status: ${error ? 'Error - ' + error.message : 'Connected to Cloud!'}</p>
                `;
            } catch(e) {
                document.getElementById('app').innerHTML = "Initialization Error: " + e.message;
            }
        }
        initApp();
    </script>
</body>
</html>
