<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCards Engine</title>
    <style>
        :root {
            --bg-deep: #070a13; --bg-card: #0b0f19; --bg-input: #111827;
            --primary-color: #3b82f6; --primary-glow: rgba(59,130,246,0.2);
            --text-main: #f8fafc; --border-color: #1e293b;
        }
        .theme-emerald { --bg-deep: #020604; --bg-card: #050f0a; --bg-input: #0c1f14; --primary-color: #10b981; --primary-glow: rgba(16,185,129,0.2); --text-main: #d1fae5; --border-color: #064e3b; }
        .theme-crimson { --bg-deep: #0a0204; --bg-card: #14050a; --bg-input: #1f0c12; --primary-color: #f43f5e; --primary-glow: rgba(244,63,94,0.2); --text-main: #ffe4e6; --border-color: #4c0519; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 99px; }
    </style>
</head>
<body id="masterBody" style="margin:0; background:var(--bg-deep); color:var(--text-main); font-family:system-ui; height:100vh; display:flex; overflow:hidden; transition: background 0.3s;">

    <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    
    // --- PERSISTENCE ENGINE ---
    const save = (key, val) => localStorage.setItem(`mc_${key}`, JSON.stringify(val));
    const load = (key, def) => localStorage.getItem(`mc_${key}`) ? JSON.parse(localStorage.getItem(`mc_${key}`)) : def;

    let settings = {
        theme: load('theme', 'default'),
        mute: load('mute', false),
        sfx: load('sfx', true),
        autoFlip: load('autoFlip', true)
    };

    document.body.innerHTML = `
      <div id="sidebarPanel" style="display:none; width: 300px; background: var(--bg-card); padding: 1rem; border-right: 1px solid var(--border-color); flex-direction: column; gap: 1rem;">
        <h2 style="margin:0; font-size:1.2rem; background:linear-gradient(to right,#3b82f6,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">OpenCards</h2>
        <input type="text" id="newDeckTitle" placeholder="New Folder Name..." style="padding:0.6rem; background:var(--bg-input); border:1px solid var(--border-color); color:white; border-radius:6px; outline:none;">
        <button id="createDeckBtn" style="background:var(--primary-color); color:white; border:none; padding:0.6rem; border-radius:6px; cursor:pointer; font-weight:800;">Create Folder</button>
        <div id="decksList" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:6px;"></div>
        <button id="logoutBtn" style="background:transparent; border:1px solid #ef4444; color:#ef4444; padding:0.5rem; border-radius:6px; cursor:pointer;">Log Out</button>
      </div>

      <div style="flex:1; padding:2rem; overflow-y:auto; display:flex; flex-direction:column; align-items:center;">
        <div id="authContainer" style="margin-top:20vh; display:flex; flex-direction:column; gap:10px; width:300px;">
           <input type="email" id="emailInput" placeholder="Email" style="padding:10px; background:var(--bg-card); border:1px solid var(--border-color); color:white;">
           <input type="password" id="passwordInput" placeholder="Password" style="padding:10px; background:var(--bg-card); border:1px solid var(--border-color); color:white;">
           <button id="loginBtn" style="padding:10px; background:var(--primary-color); color:white; border:none;">Sign In</button>
        </div>

        <div id="appScreen" style="display:none; width:100%; max-width:700px; display:flex; flex-direction:column; gap:1rem;">
           <div style="display:flex; gap:10px; justify-content:center;">
              <button id="modeFlashcardsBtn" style="padding:0.6rem 1rem; border-radius:99px; background:var(--primary-color); color:white; border:none; cursor:pointer;">Flashcards</button>
              <button id="modeSettingsBtn" style="padding:0.6rem 1rem; border-radius:99px; background:transparent; color:#ef4444; border:1px solid #ef4444; cursor:pointer;">⚙️ App Settings</button>
           </div>
           
           <div id="viewFlashcards" style="display:flex; flex-direction:column; gap:1rem;">
              <h1 id="currentDeckHeading" style="text-align:center;">Select Folder</h1>
              <div id="cardDisplay" style="background:var(--bg-card); padding:3rem; border-radius:20px; border:1px solid var(--border-color); text-align:center; cursor:pointer;">Click to Flip</div>
              <div id="individualCardsInspector" style="display:flex; flex-direction:column; gap:5px;"></div>
           </div>

           <!-- CONSOLIDATED SETTINGS DASHBOARD -->
           <div id="viewSystemSettings" style="display:none; background:var(--bg-card); padding:2rem; border-radius:20px; border:1px solid var(--border-color);">
              <h2>App & System Settings</h2>
              <div style="display:flex; flex-direction:column; gap:15px; margin-top:1rem;">
                 <label>Theme: <select id="themeSelect"><option value="default">Midnight</option><option value="emerald">Emerald</option><option value="crimson">Crimson</option></select></label>
                 <label><input type="checkbox" id="muteToggle"> Mute System Audio</label>
                 <hr style="border:0; border-top:1px solid var(--border-color); width:100%;">
                 <button id="deleteAllDecksBtn" style="color:#ef4444; background:transparent; border:1px solid #ef4444; padding:0.5rem;">Delete All Folders</button>
                 <button id="deleteAccountBtn" style="color:#ef4444; background:transparent; border:1px solid #ef4444; padding:0.5rem;">Terminate Account</button>
              </div>
              <div style="margin-top:2rem; font-size:0.7rem; color:#64748b; text-align:center;">
                 OpenCards Engine <br> Powered by Marquis
              </div>
           </div>
        </div>
      </div>
    `;

    // --- INITIALIZATION & LOGIC ---
    const supabase = createClient("https://olumrzkpqmhypagkhvmy.supabase.co", "sb_publishable_qjpgobc7wwJOiH_asyEfUg_1P-Q5FS2");
    
    // Theme setup
    const applyTheme = (t) => {
        document.body.className = '';
        if(t !== 'default') document.body.classList.add(`theme-${t}`);
    };
    applyTheme(settings.theme);
    document.getElementById('themeSelect').value = settings.theme;

    // Settings Listeners
    document.getElementById('themeSelect').onchange = (e) => {
        settings.theme = e.target.value;
        save('theme', settings.theme);
        applyTheme(settings.theme);
    };

    document.getElementById('modeSettingsBtn').onclick = () => {
        document.getElementById('viewFlashcards').style.display = 'none';
        document.getElementById('viewSystemSettings').style.display = 'block';
    };

    document.getElementById('modeFlashcardsBtn').onclick = () => {
        document.getElementById('viewFlashcards').style.display = 'flex';
        document.getElementById('viewSystemSettings').style.display = 'none';
    };

    // Auth & App logic would hook here (simplified for brevity)...
    console.log("Marquis System Ready. Auto-save active.");
    </script>
</body>
</html>
