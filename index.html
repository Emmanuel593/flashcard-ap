<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpenCards - Marquis Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Keep your existing premium CSS here */
        :root { --bg-deep: #070a13; --bg-card: #0b0f19; --primary-color: #3b82f6; --text-main: #f8fafc; --border-color: #1e293b; }
        body { background: var(--bg-deep); color: var(--text-main); font-family: sans-serif; margin: 0; }
    </style>
</head>
<body id="masterBody">

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // 1. CONFIGURATION
        const SUPABASE_URL = 'https://olumrzkpqmhypagkhvmy.supabase.co';
        // PASTE YOUR SB_PUBLISHABLE_ KEY HERE:
        const SUPABASE_KEY = 'sb_publishable_qjpgobc7wwJOiH_asyEfUg_1P-Q5FS2'; 

        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. ROUTER & UI LOGIC
        async function initApp() {
            const authContainer = document.getElementById('authContainer');
            const appScreen = document.getElementById('appScreen');
            const settingsDashboard = document.getElementById('viewSystemSettingsDashboard');

            const { data: { session } } = await supabase.auth.getSession();

            if (session) {
                // LOGGED IN
                authContainer.style.display = 'none';
                settingsDashboard.style.display = 'none';
                appScreen.style.display = 'flex';
                console.log("App ready. Cloud synced.");
            } else {
                // NOT LOGGED IN
                authContainer.style.display = 'flex';
                appScreen.style.display = 'none';
                settingsDashboard.style.display = 'none';
            }
        }

        // 3. INITIALIZE
        initApp();
    </script>

    <div id="authContainer">...</div>
    <div id="appScreen" style="display:none;">...</div>
    <div id="viewSystemSettingsDashboard" style="display:none;">...</div>

</body>
</html>
