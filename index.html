<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCards - Marquis Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ... Keep your existing CSS ... */
        :root { --bg-deep: #070a13; --bg-card: #0b0f19; --text-main: #f8fafc; --primary-color: #3b82f6; }
        body { margin:0; background:var(--bg-deep); color:var(--text-main); font-family: sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        #main-container { display:flex; flex:1; height:100%; }
    </style>
</head>
<body id="masterBody">

    <div id="main-container">
        <div id="folder-sidebar" style="width: 300px; border-right: 1px solid #1e293b; padding: 20px;">
            <h2>Folders</h2>
            <div id="folder-list">Loading folders...</div>
        </div>

        <div id="app" style="flex:1; padding: 20px;">
            <div id="viewSystemSettingsDashboard" style="display:block;">
                <h2>System Settings Dashboard</h2>
                <p>Connected to Cloud Storage.</p>
                <button id="deleteAllDecksBtn">PURGE ALL ACTIVE FOLDERS</button>
                <button id="deleteAccountBtn">TERMINATE AUTHORIZATION KEY</button>
            </div>
            
            <div id="game-view" style="display:none;">
                <div id="card-area"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const SUPABASE_URL = 'https://olumrzkpqmhypagkhvmy.supabase.co';
        const SUPABASE_ANON_KEY = 'PASTE_YOUR_ANON_KEY_HERE';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- FULL CLOUD APP LOGIC ---
        async function loadAppData() {
            // 1. Fetch Folders
            const { data: folders } = await supabase.from('decks').select('*');
            document.getElementById('folder-list').innerHTML = folders ? folders.map(f => `<div>${f.title}</div>`).join('') : "No folders found.";

            // 2. Fetch Settings
            const { data: settings } = await supabase.from('user_settings').select('*').maybeSingle();
            if (settings) document.body.className = `theme-${settings.theme}`;
        }

        // --- DESTRUCTIVE ACTIONS ---
        document.getElementById('deleteAllDecksBtn').addEventListener('click', async () => {
            if(confirm("Permanently wipe all cloud folders?")) {
                await supabase.from('decks').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                location.reload();
            }
        });

        // Initialize App
        loadAppData();
    </script>
</body>
</html>
