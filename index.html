<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCards - Marquis Edition</title>
    <style>
        /* Premium Core Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep, #070a13); }
        ::-webkit-scrollbar-thumb { background: var(--border-color, #1e293b); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-color, #3b82f6); box-shadow: 0 0 10px var(--primary-color, #3b82f6); }
        
        /* Premium Visual Themes */
        :root {
            --bg-deep: #070a13; --bg-card: #0b0f19; --bg-input: #111827;
            --primary-color: #3b82f6; --primary-glow: rgba(59,130,246,0.2);
            --text-main: #f8fafc; --border-color: #1e293b;
        }
        .theme-emerald {
            --bg-deep: #020604; --bg-card: #050f0a; --bg-input: #0c1f14;
            --primary-color: #10b981; --primary-glow: rgba(16,185,129,0.2);
            --text-main: #d1fae5; --border-color: #064e3b;
        }
        .theme-crimson {
            --bg-deep: #0a0204; --bg-card: #14050a; --bg-input: #1f0c12;
            --primary-color: #f43f5e; --primary-glow: rgba(244,63,94,0.2);
            --text-main: #ffe4e6; --border-color: #4c0519;
        }

        .premium-card { animation: pulseGlow 6s infinite ease-in-out; }
        @keyframes pulseGlow {
            0%, 100% { border-color: var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
            50% { border-color: var(--primary-color); box-shadow: 0 4px 25px var(--primary-glow); }
        }
        .match-btn-selected { border-color: var(--primary-color) !important; background: var(--primary-glow) !important; box-shadow: 0 0 12px var(--primary-color); }
    </style>
</head>
<body id="masterBody" style="margin:0; background:var(--bg-deep); color:var(--text-main); font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height:100vh; max-height:100vh; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; overflow:hidden; transition: background 0.3s, color 0.3s;">

    <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    // INITIAL STATE RECOVERY FROM LOCAL STORAGE
    const cachedTheme = localStorage.getItem('marquis-theme') || 'default';
    const cachedMute = localStorage.getItem('marquis-mute') === 'true';
    const cachedAudioSFX = localStorage.getItem('marquis-sfx') !== 'false';
    const cachedAutoFlip = localStorage.getItem('marquis-autoflip') !== 'false';
    let cachedSettingsCollapse = localStorage.getItem('marquis-collapse-settings') === 'true';
    let cachedFoldersCollapse = localStorage.getItem('marquis-collapse-folders') === 'true';

    // CORE LAYOUT BUILD ENGINE
    document.body.innerHTML = `
      <div style="display: flex; flex: 1; min-height: 0; height: 100vh; overflow:hidden;">
        
        <!-- SIDEBAR PANEL -->
        <div id="sidebarPanel" style="display: none; width: 320px; min-width: 320px; background: var(--bg-card); padding: 1.2rem; border-right: 1px solid var(--border-color); flex-direction: column; gap: 0.9rem; box-sizing: border-box; height: 100%; overflow: hidden; z-index:10; transition: background 0.3s, border 0.3s;">
          
          <div style="display:flex; align-items:center; justify-content:space-between; width:100%;">
            <div style="display:flex; align-items:center; gap:10px;">
              <span style="font-size:1.5rem; filter: drop-shadow(0 0 10px var(--primary-color));">📚</span>
              <h2 style="margin:0; font-size:1.3rem; font-weight:900; background: linear-gradient(to right, #3b82f6, #a78bfa, #f43f5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing:-0.5px;">OpenCards</h2>
            </div>
            <button id="logoutBtn" style="background:rgba(239, 68, 68, 0.08); color:#ef4444; border:1px solid rgba(239, 68, 68, 0.2); padding:0.4rem 0.8rem; border-radius:6px; font-weight:700; cursor:pointer; font-size:0.75rem;">Log Out</button>
          </div>
          
          <hr style="border:0; border-top:1px solid var(--border-color); margin:0;">
          
          <!-- COLLAPSIBLE APP SETTINGS CONTAINER -->
          <div style="display:flex; flex-direction:column; gap:6px;">
            <div style="display:flex; justify-content:space-between; align-items:center; cursor:pointer; user-select:none;" id="toggleSettingsHeader">
              <h3 style="margin:0; font-size:0.75rem; font-weight: 800; color:#64748b; letter-spacing: 0.1em; text-transform: uppercase;">⚙️ Quick Config</h3>
              <span id="settingsCollapseArrow" style="font-size:0.75rem; color:#64748b; transition:transform 0.2s;">▼</span>
            </div>
            
            <div id="settingsContentBox" style="background:rgba(255,255,255,0.01); border:1px solid var(--border-color); padding:0.8rem; border-radius:12px; display:flex; flex-direction:column; gap:10px; transition: max-height 0.2s ease-out, opacity 0.2s, margin 0.2s; overflow:hidden;">
              <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.8rem;">
                <span style="font-weight:700; color:#94a3b8;">Mute System Audio:</span>
                <input type="checkbox" id="settingMuteToggle" style="cursor:pointer;" ${cachedMute ? 'checked' : ''}>
              </div>
              
              <div id="audioSubSettings" style="display:flex; flex-direction:column; gap:8px; opacity: ${cachedMute ? '0.35' : '1'}; pointer-events: ${cachedMute ? 'none' : 'auto'};">
                <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.8rem;">
                  <span style="font-weight:600; color:#94a3b8; padding-left:8px;">• Sound Effects:</span>
                  <input type="checkbox" id="settingAudioToggle" style="cursor:pointer;" ${cachedAudioSFX ? 'checked' : ''}>
                </div>
              </div>

              <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.8rem;">
                <span style="font-weight:700; color:#94a3b8;">Reset to Term on Nav:</span>
                <input type="checkbox" id="settingAutoFlipTerm" style="cursor:pointer;" ${cachedAutoFlip ? 'checked' : ''}>
              </div>

              <div style="display:flex; flex-direction:column; gap:4px; font-size:0.8rem;">
                <span style="font-weight:700; color:#94a3b8;">Color Theme:</span>
                <select id="settingThemeSelect" style="background:var(--bg-input); color:var(--text-main); border:1px solid var(--border-color); padding:5px; border-radius:6px; font-weight:700; outline:none; cursor:pointer; width:100%;">
                  <option value="default" ${cachedTheme === 'default' ? 'selected' : ''}>Midnight Blue</option>
                  <option value="emerald" ${cachedTheme === 'emerald' ? 'selected' : ''}>Deep Emerald</option>
                  <option value="crimson" ${cachedTheme === 'crimson' ? 'selected' : ''}>Vampire Crimson</option>
                </select>
              </div>
            </div>
          </div>

          <hr style="border:0; border-top:1px solid var(--border-color); margin:0;">
          
          <!-- CREATE FOLDER INTERFACE -->
          <div style="display:flex; flex-direction:column; gap:6px;">
            <h3 style="margin:0; font-size:0.7rem; font-weight: 800; color:#475569; letter-spacing: 0.1em; text-transform: uppercase;">Create Folder</h3>
            <div style="display:flex; gap:8px;">
              <input type="text" id="newDeckTitle" placeholder="Folder Name..." style="flex:1; padding:0.65rem 0.8rem; border-radius:8px; border:1px solid var(--border-color); background:var(--bg-input); color:white; min-width:0; font-size:0.9rem; outline:none;">
              <button id="createDeckBtn" style="background:var(--primary-color); color:white; border:none; padding:0.65rem 1rem; border-radius:8px; font-weight:bold; cursor:pointer; font-size:1.1rem; box-shadow: 0 4px 12px var(--primary-glow);">+</button>
            </div>
          </div>
          
          <hr style="border:0; border-top:1px solid var(--border-color); margin:0;">
          
          <!-- FOLDERS MANAGER -->
          <div style="display:flex; flex-direction:column; gap:6px; flex:1; min-height:0;">
            <div style="display:flex; justify-content:space-between; align-items:center; cursor:pointer; user-select:none; padding:2px 0;" id="toggleFoldersHeader">
              <h3 style="margin:0; font-size:0.75rem; font-weight: 800; color:#64748b; letter-spacing: 0.1em; text-transform: uppercase;">Your Folders</h3>
              <span id="collapseArrow" style="font-size:0.75rem; color:#64748b; transition:transform 0.2s;">▼</span>
            </div>
            
            <input type="text" id="sidebarSearchInput" placeholder="🔍 Search folders..." style="width:100%; padding:0.5rem 0.75rem; border-radius:8px; border:1px solid var(--border-color); background:var(--bg-input); color:white; font-size:0.85rem; box-sizing:border-box; outline:none; margin-bottom:4px;">

            <div id="decksList" style="display:flex; flex-direction:column; gap:8px; overflow-y:auto; flex:1; padding-right:6px; transition: max-height 0.25s ease-out;"></div>
            
            <div style="display:flex; flex-direction:column; gap:6px; margin-top:auto; padding-top:8px; border-top:1px solid var(--border-color);">
               <button id="shuffleDeckBtn" style="background:rgba(59, 130, 246, 0.1); color:var(--primary-color); border:1px solid var(--primary-color); width:100%; padding:0.6rem; border-radius:8px; font-weight:800; font-size:0.8rem; cursor:pointer; text-transform:uppercase; letter-spacing:0.05em;">🔀 Shuffle Selected Deck</button>
            </div>
          </div>
        </div>

        <!-- MAIN CONTAINER WORKSPACE -->
        <div style="flex:1; padding:2rem; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; box-sizing:border-box; height:100%; overflow-y:auto; min-width:0; background: radial-gradient(circle at top, var(--primary-glow), transparent 60%);">
          
          <!-- AUTH INTERFACE LAYER -->
          <div id="authContainer" style="display: flex; flex-direction: column; gap: 1.5rem; align-items: center; width:100%; margin-top: auto; margin-bottom: auto;">
            <div id="authScreen" style="background: var(--bg-card); padding: 2.75rem; border-radius: 24px; width: 360px; display: flex; flex-direction: column; gap: 14px; border: 1px solid var(--border-color); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);">
              <h2 style="margin: 0; text-align:center; font-size:1.85rem; font-weight:900; letter-spacing:-1px;">OpenCards</h2>
              <p style="margin:0 0 16px 0; font-size:0.85rem; color:#64748b; text-align:center; font-weight:500;">Cloud Management Sign In</p>
              <input type="email" id="emailInput" placeholder="Email Address" style="padding: 0.8rem 1rem; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-input); color: white; font-size:0.95rem; outline:none;">
              <input type="password" id="passwordInput" placeholder="Password Access Key" style="padding: 0.8rem 1rem; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-input); color: white; font-size:0.95rem; outline:none;">
              <button id="loginBtn" style="padding: 0.85rem; border-radius: 10px; background: #3b82f6; color: white; font-weight: 700; border: none; cursor: pointer; font-size:1rem; margin-top:6px; box-shadow: 0 4px 14px rgba(59, 130, 246, 0.35);">Sign In</button>
              <button id="signUpBtn" style="padding: 0.85rem; border-radius: 10px; background: transparent; color: #64748b; font-weight: 600; border: 1px solid var(--border-color); cursor: pointer; font-size:0.95rem;">Register New Account</button>
            </div>

            <div id="verifyEmailScreen" style="display: none; background: var(--bg-card); padding: 2.75rem; border-radius: 24px; width: 360px; flex-direction: column; align-items: center; text-align: center; gap: 18px; border: 1px solid var(--border-color); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);">
              <div style="font-size: 3.5rem;">✉️</div>
              <h2 style="margin: 0; font-weight:900; color: #3b82f6; font-size:1.6rem; letter-spacing:-0.5px;">Verify Email</h2>
              <p style="margin: 0; font-size: 0.95rem; color: #64748b; line-height:1.5;">Check your inbox for your account validation link.</p>
              <button id="backToLoginBtn" style="width: 100%; padding: 0.8rem; border-radius: 10px; background: var(--bg-input); color: #e5e7eb; font-weight: 600; border: 1px solid var(--border-color); cursor: pointer;">← Return to Sign In</button>
            </div>
          </div>

          <!-- MAIN APP WINDOW -->
          <div id="appScreen" style="display: none; width:100%; max-width:720px; flex-direction: column; align-items: center; gap:1.3rem;">
            
            <div style="text-align:center; width:100%;">
              <h1 id="currentDeckHeading" style="margin:0; font-size:2.4rem; font-weight:900; letter-spacing:-1px;">Select or Create a Folder</h1>
              <div style="display:flex; justify-content:center; align-items:center; gap:12px; margin-top:8px;">
                <p id="cardCounter" style="color:#475569; margin:0; font-weight:800; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.08em;">0 cards</p>
                <div id="streakBadge" style="display:none; background:linear-gradient(135deg, #f59e0b, #ef4444); color:white; font-size:0.75rem; font-weight:900; padding:3px 10px; border-radius:20px; box-shadow: 0 0 15px rgba(239,68,68,0.4); text-transform:uppercase;">🔥 Streak: <span id="streakCount">0</span></div>
              </div>
            </div>

            <!-- CORE VIEW SCREEN ROUTER BAR WITH PHYSICAL DASHBOARD SWITCH BUTTON -->
            <div style="display:flex; background:var(--bg-card); padding:5px; border-radius:99px; border:1px solid var(--border-color); box-shadow: 0 8px 32px rgba(0,0,0,0.5); gap:2px; flex-wrap:wrap; justify-content:center;">
              <button id="modeFlashcardsBtn" style="background:var(--primary-color); color:white; padding:0.6rem 1.2rem; border:none; border-radius:99px; cursor:pointer; font-weight:800; font-size:0.8rem; transition:0.2s;">Standard Cards</button>
              <button id="modeQuizBtn" style="background:transparent; color:#64748b; padding:0.6rem 1.2rem; border:none; border-radius:99px; cursor:pointer; font-weight:800; font-size:0.8rem; transition:0.2s;">Chill Quiz</button>
              <button id="modeCramBtn" style="background:transparent; color:#64748b; padding:0.6rem 1.2rem; border:none; border-radius:99px; cursor:pointer; font-weight:800; font-size:0.8rem; transition:0.2s;">Cram Mode</button>
              <button id="modeSpeedBtn" style="background:transparent; color:#64748b; padding:0.6rem 1.2rem; border:none; border-radius:99px; cursor:pointer; font-weight:800; font-size:0.8rem; transition:0.2s;">Speed Run</button>
              <button id="modeMatchBtn" style="background:transparent; color:#64748b; padding:0.6rem 1.2rem; border:none; border-radius:99px; cursor:pointer; font-weight:800; font-size:0.8rem; transition:0.2s;">Match Blast</button>
              <button id="modeSystemSettingsBtn" style="background:transparent; color:#ef4444; border: 1px dashed rgba(239,68,68,0.4); padding:0.6rem 1.2rem; border-radius:99px; cursor:pointer; font-weight:800; font-size:0.8rem; transition:0.2s; margin-left:4px;">🛠️ App Settings</button>
            </div>

            <!-- CARD GENERATION ENGINE + MASS BULK ADD ACCORDION -->
            <div id="cardEditorAndBulkSection" style="width:100%; display:flex; flex-direction:column; gap:8px;">
              <div id="cardEditorBox" style="background: var(--bg-card); padding: 1rem; border-radius: 16px; width: 100%; display: flex; gap: 12px; border: 1px solid var(--border-color); box-sizing:border-box; box-shadow:0 10px 30px rgba(0,0,0,0.2);">
                <input type="text" id="termInput" placeholder="Add Term..." style="flex:1; padding: 0.75rem 1.1rem; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-input); color: white; font-size:0.9rem; outline:none;">
                <input type="text" id="defInput" placeholder="Add Definition..." style="flex:1; padding: 0.75rem 1.1rem; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-input); color: white; font-size:0.9rem; outline:none;">
                <button id="addCardBtn" style="padding: 0.75rem 1.5rem; border-radius: 10px; background: var(--primary-color); color: white; font-weight: 800; border: none; cursor: pointer; font-size:0.9rem; box-shadow: 0 4px 12px var(--primary-glow);">Add</button>
              </div>
              
              <!-- BULK IMPORTER PANEL -->
              <div style="background: var(--bg-card); border: 1px solid var(--border-color); border-radius:12px; padding:8px 12px;">
                <div id="bulkToggleHeader" style="cursor:pointer; font-size:0.75rem; font-weight:800; color:#64748b; display:flex; justify-content:between; width:100%; text-transform:uppercase; letter-spacing:0.05em;">
                  <span style="flex:1;">📋 Bulk Import / Export Engine</span>
                  <span id="bulkArrow">▲</span>
                </div>
                <div id="bulkContent" style="display:none; flex-direction:column; gap:8px; margin-top:8px;">
                  <textarea id="bulkTextArea" placeholder="Paste lines formatted as: Term - Definition&#10;Example:&#10;Apple - A delicious round red fruit&#10;Banana - A long curved yellow fruit" style="width:100%; height:110px; background:var(--bg-input); color:white; border:1px solid var(--border-color); border-radius:8px; padding:8px; box-sizing:border-box; font-family:monospace; font-size:0.8rem; resize:vertical; outline:none;"></textarea>
                  <div style="display:flex; gap:10px;">
                    <button id="bulkImportBtn" style="flex:1; background:var(--primary-color); border:none; color:white; padding:6px; font-weight:800; border-radius:6px; font-size:0.75rem; cursor:pointer;">PARSE & IMPORT DATA</button>
                    <button id="bulkExportBtn" style="flex:1; background:transparent; border:1px solid var(--border-color); color:#94a3b8; padding:6px; font-weight:800; border-radius:6px; font-size:0.75rem; cursor:pointer;">LOAD CURRENT DATA</button>
                  </div>
                </div>
              </div>
            </div>

            <!-- VIEWPORT LAYOUT WRAPPER -->
            <div id="workspace" style="width:100%; min-height:380px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start;">
              
              <!-- MODE 1: STANDARD FLASHCARDS -->
              <div id="viewFlashcards" style="width:100%; display:flex; flex-direction:column; align-items:center; gap:1.2rem;">
                <div style="width:100%; background:var(--bg-input); height:6px; border-radius:99px; overflow:hidden; border:1px solid rgba(255,255,255,0.02);">
                  <div id="deckProgressBar" style="width:0%; height:100%; background:var(--primary-color); transition: width 0.2s ease;"></div>
                </div>

                <div id="cardDisplay" class="premium-card" style="background: var(--bg-card); width: 100%; height: 210px; display: flex; justify-content: center; align-items: center; border-radius: 24px; font-size: 1.65rem; font-weight: 800; text-align: center; cursor: pointer; border: 1px solid var(--border-color); padding: 2.5rem; box-sizing:border-box; user-select: none; transition: transform 0.25s, background 0.2s; box-shadow: 0 25px 50px rgba(0,0,0,0.65);">Select a folder to load cards.</div>
                <div style="display:flex; gap:28px; align-items:center;">
                  <button id="prevBtn" style="background:var(--bg-card); border:1px solid var(--border-color); color:white; width:56px; height:56px; border-radius:50%; font-size:1.5rem; cursor:pointer; display:flex; align-items:center; justify-content:center;">←</button>
                  <span id="navTracker" style="font-weight:800; font-size:1.2rem; color:#475569; min-width:100px; text-align:center;">0 / 0</span>
                  <button id="nextBtn" style="background:var(--bg-card); border:1px solid var(--border-color); color:white; width:56px; height:56px; border-radius:50%; font-size:1.5rem; cursor:pointer; display:flex; align-items:center; justify-content:center;">→</button>
                </div>

                <!-- INDIVIDUAL NESTED FLASHCARD INSPECTOR ENGINE (VIEW & EDIT INDIVIDUAL CARD STRINGS) -->
                <div style="width:100%; margin-top:1.5rem; display:flex; flex-direction:column; gap:8px;">
                  <h3 style="margin:0; font-size:0.8rem; font-weight:900; color:#64748b; text-transform:uppercase; letter-spacing:0.05em;">📋 Cards Inside Folder (Click Items to Edit/Rename)</h3>
                  <div id="individualCardsInspector" style="display:flex; flex-direction:column; gap:8px; max-height:280px; overflow-y:auto; width:100%; padding-right:4px;"></div>
                </div>
              </div>

              <!-- MODE 2 & 3: QUIZ & CRAM SYSTEM -->
              <div id="viewQuizOrCram" style="width:100%; display:none; flex-direction:column; gap:1.25rem;">
                <div id="cramTimerDock" style="display:flex; flex-direction:column; background:var(--bg-card); padding:1rem 1.4rem; border-radius:16px; border:1px solid var(--border-color); gap:10px;">
                  <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; align-items:center; gap:10px;">
                      <span style="color:#ef4444; font-weight:900; font-size:0.8rem; letter-spacing:0.08em;">TIMEOUT TIMER:</span>
                      <span id="quizTimer" style="font-size:1.4rem; font-weight:900; color:#ef4444;">10s</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                      <span style="font-size:0.8rem; color:#64748b; font-weight:800;">Interval:</span>
                      <select id="timerSettingSelect" style="background:var(--bg-input); color:var(--text-main); border:1px solid var(--border-color); padding:6px 10px; border-radius:8px; font-weight:800; font-size:0.85rem; cursor:pointer; outline:none;">
                        <option value="5">5 seconds</option>
                        <option value="10" selected>10 seconds</option>
                        <option value="15">15 seconds</option>
                        <option value="30">30 seconds</option>
                      </select>
                    </div>
                  </div>
                  <div style="width:100%; background:var(--bg-input); height:6px; border-radius:99px; overflow:hidden;">
                    <div id="cramProgressBar" style="width:100%; height:100%; background:linear-gradient(to right, #ef4444, #f59e0b); transform-origin: left; transition: width 1s linear;"></div>
                  </div>
                </div>
                <div id="quizQuestion" style="background:var(--bg-card); padding:2.25rem; border-radius:20px; font-size:1.4rem; font-weight:800; text-align:center; border:1px solid var(--border-color);">Question</div>
                <div id="quizOptions" style="display:flex; flex-direction:column; gap:12px;"></div>
                <div id="quizFeedback" style="text-align:center; font-weight:900; font-size:1.2rem; min-height:30px;"></div>
              </div>

              <!-- MODE 4: SPEED RUN MATRIX -->
              <div id="viewSpeedRun" style="width:100%; display:none; flex-direction:column; align-items:center; gap:1.25rem;">
                <div style="background:var(--bg-card); padding:1rem 2rem; border-radius:16px; border:1px solid var(--border-color); text-align:center; box-shadow:0 0 20px rgba(0,0,0,0.3);">
                  <div style="font-size:0.75rem; color:#64748b; font-weight:800; text-transform:uppercase;">Stopwatch Timer</div>
                  <div id="speedTimerDisplay" style="font-size:2.2rem; font-weight:900; font-family:monospace; color:var(--primary-color);">00:00.000</div>
                </div>
                <div id="speedCardDisplay" style="background:var(--bg-card); width:100%; padding:2.5rem; text-align:center; border-radius:20px; border:1px solid var(--border-color); font-size:1.5rem; font-weight:800;">Press Start to Race</div>

      if(document.getElementById('settingMuteToggle').checked) return;
      if(!document.getElementById('settingAudioToggle').checked) return;
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch(e) {}
    }

    document.getElementById('prevBtn').onclick = () => executePrevCard();

    // --- INDIVIDUAL CARD VIEWER & RENAME INLINE CONTROLLER ENGINE ---
    function renderIndividualCardsInspector() {
      const inspector = document.getElementById('individualCardsInspector');
      inspector.innerHTML = '';
      
      if(currentDeckIndex === -1) return;
      const cards = allDecks[currentDeckIndex].cards;
      
      if(cards.length === 0) {
        inspector.innerHTML = `<p style="color:#475569; font-size:0.8rem; margin:4px 0; font-weight:700;">No cards stored in this folder profile yet.</p>`;
        return;
      }

      cards.forEach((card, idx) => {
        const row = document.createElement('div');
        row.style.cssText = `display:flex; background:var(--bg-input); border:1px solid var(--border-color); border-radius:10px; padding:8px 12px; gap:10px; align-items:center; justify-content:space-between;`;

        const dataBlock = document.createElement('div');
        dataBlock.style.cssText = `display:flex; gap:14px; flex:1; min-width:0; overflow:hidden; font-size:0.85rem;`;

        const termSpan = document.createElement('div');
        termSpan.style.cssText = `color:var(--primary-color); font-weight:800; cursor:pointer; text-decoration:underline dashed rgba(59,130,246,0.3); text-underline-offset:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:40%;`;
        termSpan.innerText = card.term;
        termSpan.title = "Click to rename term strings";
        termSpan.onclick = () => inlineUpdateCardKey(idx, 'term');

        const spacer = document.createElement('span');
        spacer.innerText = "➔";
        spacer.style.color = "#475569";

        const defSpan = document.createElement('div');
        defSpan.style.cssText = `color:#94a3b8; font-weight:600; cursor:pointer; text-decoration:underline dashed rgba(148,163,184,0.3); text-underline-offset:3px; overflow:hidden; text-overflow:ellipsis; flex:1;`;
        defSpan.innerText = card.definition;
        defSpan.title = "Click to rename definition strings";
        defSpan.onclick = () => inlineUpdateCardKey(idx, 'definition');

        dataBlock.appendChild(termSpan);
        dataBlock.appendChild(spacer);
        dataBlock.appendChild(defSpan);

        const dropCardBtn = document.createElement('button');
        dropCardBtn.innerText = "🗑️";
        dropCardBtn.style.cssText = `background:transparent; border:none; color:#ef4444; opacity:0.6; cursor:pointer; font-size:0.8rem; padding:4px;`;
        dropCardBtn.onclick = () => dropIndividualCardRecord(idx);

        row.appendChild(dataBlock);
        row.appendChild(dropCardBtn);
        inspector.appendChild(row);
      });
    }

    async function inlineUpdateCardKey(cardIndex, fieldKey) {
      const targetDeck = allDecks[currentDeckIndex];
      const oldVal = targetDeck.cards[cardIndex][fieldKey];
      const newVal = prompt(`Update card ${fieldKey} string value:`, oldVal);
      
      if(!newVal || newVal.trim() === "" || newVal.trim() === oldVal) return;
      
      targetDeck.cards[cardIndex][fieldKey] = newVal.trim();
      updateFlashcardUI();
      await autoSyncCardsToCloud();
    }

    async function dropIndividualCardRecord(cardIndex) {
      if(!confirm("Remove this individual card record from folder?")) return;
      allDecks[currentDeckIndex].cards.splice(cardIndex, 1);
      
      document.getElementById('cardCounter').innerText = `${allDecks[currentDeckIndex].cards.length} cards`;
      renderDecksList();
      updateFlashcardUI();
      await autoSyncCardsToCloud();
    }

    // --- HARDWARE ACCELERATOR KEYBOARD ENGINE ---
    window.addEventListener('keydown', (e) => {
      if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT' || document.activeElement.tagName === 'TEXTAREA') return;
      if (activeMode !== 'cards') return;
      
      if (e.code === 'Space') {
        e.preventDefault();
        toggleCardFlip();
      } else if (e.code === 'ArrowRight') {
        executeNextCard();
      } else if (e.code === 'ArrowLeft') {
        executePrevCard();
      }
    });

    // --- INTERFACE DECK OVERLAYS SWITCH ROUTER ---
    function switchMode(mode) {
      activeMode = mode;
      clearAllTimersGlobal();
      
      document.getElementById('viewFlashcards').style.display = mode === 'cards' ? 'flex' : 'none';
      document.getElementById('viewQuizOrCram').style.display = (mode === 'quiz' || mode === 'cram') ? 'flex' : 'none';
      document.getElementById('cramTimerDock').style.display = mode === 'cram' ? 'flex' : 'none';
      document.getElementById('viewSpeedRun').style.display = mode === 'speed' ? 'flex' : 'none';
      document.getElementById('viewMatchBlast').style.display = mode === 'match' ? 'flex' : 'none';
      document.getElementById('viewSystemSettingsDashboard').style.display = mode === 'settings' ? 'flex' : 'none';
      
      document.getElementById('cardEditorAndBulkSection').style.display = mode === 'settings' ? 'none' : 'flex';
      document.getElementById('streakBadge').style.display = (mode === 'quiz' || mode === 'cram') ? 'block' : 'none';

      ['cards', 'quiz', 'cram', 'speed', 'match', 'settings'].forEach(m => {
        const idMap = { 
          'cards': 'modeFlashcardsBtn', 
          'quiz': 'modeQuizBtn', 
          'cram': 'modeCramBtn', 
          'speed': 'modeSpeedBtn', 
          'match': 'modeMatchBtn',
          'settings': 'modeSystemSettingsBtn'
        };
        const el = document.getElementById(idMap[m]);
        if(m === mode) {
          if(m === 'settings') {
            el.style.background = '#ef4444';
            el.style.color = 'white';
          } else {
            el.style.background = 'var(--primary-color)';
            el.style.color = 'white';
          }
        } else {
          el.style.background = 'transparent';
          el.style.color = (m === 'settings') ? '#ef4444' : '#64748b';
        }
      });

      if (mode === 'cards') {
        updateFlashcardUI();
        renderIndividualCardsInspector();
      }
      if (mode === 'quiz' || mode === 'cram') startTestingEngines();
      if (mode === 'speed') initSpeedRunLayout();
      if (mode === 'match') initMatchBlastGrid();
    }

    document.getElementById('modeFlashcardsBtn').onclick = () => switchMode('cards');
    document.getElementById('modeQuizBtn').onclick = () => switchMode('quiz');
    document.getElementById('modeCramBtn').onclick = () => switchMode('cram');
    document.getElementById('modeSpeedBtn').onclick = () => switchMode('speed');
    document.getElementById('modeMatchBtn').onclick = () => switchMode('match');
    document.getElementById('modeSystemSettingsBtn').onclick = () => switchMode('settings');

    // --- CHILL QUIZ & CRAM RUN TIMES ---
    function startTestingEngines() {
      quizCurrentIndex = 0;
      currentStreak = 0;
      updateStreakBadge();
      document.getElementById('quizFeedback').innerText = '';
      loadTestingQuestion();
    }

    function updateStreakBadge() {
      document.getElementById('streakCount').innerText = currentStreak;
    }

    function runCramClockTimer() {
      clearInterval(countdownInterval);
      secondsLeft = configuredTimerMax;
      document.getElementById('quizTimer').innerText = `${secondsLeft}s`;
      
      const bar = document.getElementById('cramProgressBar');
      bar.style.transition = 'none';
      bar.style.width = '100%';
      
      setTimeout(() => {
        bar.style.transition = `width ${secondsLeft}s linear`;
        bar.style.width = '0%';
      }, 50);

      countdownInterval = setInterval(() => {
        secondsLeft--;
        document.getElementById('quizTimer').innerText = `${secondsLeft}s`;
        if(secondsLeft <= 0) {
          clearInterval(countdownInterval);
          flagCramTimeout();
        }
      }, 1000);
    }

    function loadTestingQuestion() {
      const cards = allDecks[currentDeckIndex]?.cards || [];
      const questionBox = document.getElementById('quizQuestion');
      const optionsBox = document.getElementById('quizOptions');
      optionsBox.innerHTML = '';
      
      if (cards.length < 2) {
        questionBox.innerText = "Folders require at least 2 cards to play multiple-choice modes.";
        return;
      }

      if (quizCurrentIndex >= cards.length) {
        questionBox.innerText = "🎉 All cards completed successfully!";
        return;
      }

      const currentCard = cards[quizCurrentIndex];
      questionBox.innerText = `Define: "${currentCard.term}"`;

      let options = [currentCard.definition];
      let pool = cards.filter(c => c.definition !== currentCard.definition).map(c => c.definition);
      
      pool = pool.sort(() => 0.5 - Math.random());
      for(let i=0; i<Math.min(3, pool.length); i++) { options.push(pool[i]); }
      options = options.sort(() => 0.5 - Math.random());

      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.innerText = opt;
        btn.style.cssText = `background:var(--bg-input); color:var(--text-main); border:1px solid var(--border-color); padding:14px; border-radius:12px; text-align:left; cursor:pointer; font-weight:700; font-size:0.95rem; transition:0.15s;`;
        btn.onclick = () => verifyActiveAnswer(opt, currentCard.definition);
        optionsBox.appendChild(btn);
      });

      if (activeMode === 'cram') runCramClockTimer();
    }

    function verifyActiveAnswer(selected, correct) {
      clearInterval(countdownInterval);
      const feedback = document.getElementById('quizFeedback');
      
      if (selected === correct) {
        triggerHapticAudio(587.33, 0.12, "triangle");
        
        currentStreak++;
        updateStreakBadge();
        feedback.innerText = "Correct!";
        feedback.style.color = "#10b981";
        
        setTimeout(() => {
          quizCurrentIndex++;
          feedback.innerText = '';
          loadTestingQuestion();
        }, 1000);
      } else {
        triggerHapticAudio(110, 0.25, "sawtooth");
        currentStreak = 0;
        updateStreakBadge();
        feedback.innerText = "Incorrect. Try again!";
        feedback.style.color = "#ef4444";
        
        if (activeMode === 'cram') runCramClockTimer();
      }
    }

    function flagCramTimeout() {
      triggerHapticAudio(130, 0.35, "sawtooth");
      currentStreak = 0;
      updateStreakBadge();
      
      const feedback = document.getElementById('quizFeedback');
      feedback.innerText = "Time expired! Advancing to next card...";
      feedback.style.color = "#f59e0b";
      
      setTimeout(() => {
        quizCurrentIndex++;
        feedback.innerText = '';
        loadTestingQuestion();
      }, 1400);
    }

    // --- SPEED RUN TIME TRIAL ---
    function initSpeedRunLayout() {
      speedActiveRunning = false;
      speedCurrentIndex = 0;
      document.getElementById('speedTimerDisplay').innerText = "00:00.000";
      document.getElementById('speedCardDisplay').innerText = "Press Start to Begin";
      document.getElementById('speedAnswerInput').value = '';
      document.getElementById('speedAnswerInput').disabled = true;
      document.getElementById('speedRunFeedback').innerText = '';
      document.getElementById('speedRunStartBtn').style.display = 'block';
    }

    document.getElementById('speedRunStartBtn').onclick = () => {
      const cards = allDecks[currentDeckIndex]?.cards || [];
      if(cards.length === 0) return alert("Add cards to this folder to run time trials.");
      
      speedActiveRunning = true;
      speedCurrentIndex = 0;
      document.getElementById('speedRunStartBtn').style.display = 'none';
      document.getElementById('speedAnswerInput').disabled = false;
      document.getElementById('speedAnswerInput').focus();
      
      speedStartTime = performance.now();
      speedStopwatchInterval = setInterval(() => {
        const elapsed = performance.now() - speedStartTime;
        const m = Math.floor(elapsed / 60000).toString().padStart(2, '0');
        const s = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
        const ms = Math.floor(elapsed % 1000).toString().padStart(3, '0');
        document.getElementById('speedTimerDisplay').innerText = `${m}:${s}.${ms}`;
      }, 33);

      loadSpeedRunCard();
    };

    function loadSpeedRunCard() {
      const cards = allDecks[currentDeckIndex].cards;
      if(speedCurrentIndex >= cards.length) {
        clearInterval(speedStopwatchInterval);
        speedActiveRunning = false;
        document.getElementById('speedAnswerInput').disabled = true;
        document.getElementById('speedCardDisplay').innerText = "🏁 Finish! Run complete.";
        return;
      }
      document.getElementById('speedCardDisplay').innerText = `Term: "${cards[speedCurrentIndex].term}"`;
    }

    document.getElementById('speedAnswerInput').onkeydown = (e) => {
      if(e.key !== 'Enter' || !speedActiveRunning) return;
      const val = e.target.value.trim().toLowerCase();
      const target = allDecks[currentDeckIndex].cards[speedCurrentIndex].definition.trim().toLowerCase();
      const feed = document.getElementById('speedRunFeedback');

      if(val === target) {
        triggerHapticAudio(659.25, 0.1, "sine");
        feed.innerText = "Correct";
        feed.style.color = "#10b981";
        speedCurrentIndex++;
        e.target.value = '';
        loadSpeedRunCard();
      } else {
        triggerHapticAudio(180, 0.2, "triangle");
        feed.innerText = "Incorrect definition";
        feed.style.color = "#ef4444";
      }
    };

    // --- MATCH BLAST CONNECTIONS MATRIX ---
    function initMatchBlastGrid() {
      clearInterval(matchBlastInterval);
      matchActiveTimer = false;
      matchSelectedBtn = null;
      matchClearedCount = 0;
      document.getElementById('matchBlastTimer').innerText = "Time: 0.0s";
      
      const cards = allDecks[currentDeckIndex]?.cards || [];
      const grid = document.getElementById('matchGridContainer');
      grid.innerHTML = '';

      if(cards.length < 2) {
        grid.innerHTML = `<p style="grid-column:1/-1; color:#475569; text-align:center; font-weight:700; padding:20px;">Add at least 2 cards to play Match Blast.</p>`;
        return;
      }

      let elements = [];
      const activeSample = cards.slice(0, 8); 
      activeSample.forEach((c, idx) => {
        elements.push({ text: c.term, matchId: idx, type: 'term' });
        elements.push({ text: c.definition, matchId: idx, type: 'def' });
      });

      elements.sort(() => 0.5 - Math.random());

      elements.forEach(item => {
        const b = document.createElement('button');
        b.innerText = item.text;
        b.style.cssText = `background:var(--bg-card); color:var(--text-main); border:1px solid var(--border-color); padding:14px; border-radius:10px; font-weight:700; font-size:0.85rem; cursor:pointer; text-align:center; transition:0.15s; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; min-height:64px;`;
        
        b.onclick = () => executeMatchSelection(b, item);
        grid.appendChild(b);
      });
    }

    function executeMatchSelection(btn, item) {
      if(!matchActiveTimer) {
        matchActiveTimer = true;
        matchBlastStartTime = performance.now();
        matchBlastInterval = setInterval(() => {
          const delta = ((performance.now() - matchBlastStartTime) / 1000).toFixed(1);
          document.getElementById('matchBlastTimer').innerText = `Time: ${delta}s`;
        }, 100);
      }

      if(btn.style.opacity === "0") return;

      if(!matchSelectedBtn) {
        matchSelectedBtn = { btn, item };
        btn.classList.add('match-btn-selected');
        triggerHapticAudio(440, 0.05, "sine");
      } else {
        if(matchSelectedBtn.btn === btn) {
          btn.classList.remove('match-btn-selected');
          matchSelectedBtn = null;
          return;
        }

        if(matchSelectedBtn.item.matchId === item.matchId && matchSelectedBtn.item.type !== item.type) {
          triggerHapticAudio(783.99, 0.15, "sine");
          matchSelectedBtn.btn.style.opacity = "0";
          matchSelectedBtn.btn.style.pointerEvents = "none";
          btn.style.opacity = "0";
          btn.style.pointerEvents = "none";
          
          matchClearedCount += 2;
          const totalExpected = Math.min(allDecks[currentDeckIndex].cards.length, 8) * 2;
          if(matchClearedCount >= totalExpected) {
            clearInterval(matchBlastInterval);
          }
        } else {
          triggerHapticAudio(220, 0.2, "sawtooth");
          matchSelectedBtn.btn.classList.remove('match-btn-selected');
        }
        matchSelectedBtn = null;
      }
    }

    document.getElementById('matchResetBtn').onclick = () => initMatchBlastGrid();
    </script>
</body>
</html>
